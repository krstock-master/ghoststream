name: GhostStream
options:
  bundleIdPrefix: com.ghoststream
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    MARKETING_VERSION: "0.4.0"
    CURRENT_PROJECT_VERSION: "4"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGN_STYLE: "Manual"
    DEVELOPMENT_TEAM: ""
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: "wholemodule"

targets:
  GhostStream:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - Tests/**
          - "*.sh"
          - "*.md"
          - "*.yml"
          - "*.bat"
          - .github/**
          - .git/**
          - .gitignore
          - ExportOptions.plist
          - DEPENDENCIES.swift
          - VPN/Tunnel/**
          - project.yml
          - GhostStream.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghoststream.browser
        PRODUCT_NAME: "GhostStream"
    info:
      properties:
        CFBundleDisplayName: GhostStream
        LSRequiresIPhoneOS: true
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - fetch
          - processing
        NSFaceIDUsageDescription: "보관함 잠금 해제에 Face ID를 사용합니다."
        NSUserTrackingUsageDescription: "GhostStream은 사용자를 추적하지 않습니다."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        BGTaskSchedulerPermittedIdentifiers:
          - com.ghoststream.blocklist.update
          - com.ghoststream.media.bg
          - com.ghoststream.hls.bg
