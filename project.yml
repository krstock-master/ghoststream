name: GhostStream
options:
  bundleIdPrefix: com.ghoststream
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "25"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGN_STYLE: "Manual"
    DEVELOPMENT_TEAM: ""
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: "wholemodule"

packages:
  GhostStreamCore:
    url: https://github.com/krstock-master/ghoststream-core.git
    from: 1.0.0

packages:
  GhostStreamCore:
    url: https://github.com/krstock-master/ghoststream-core.git
    from: 1.0.0

targets:
  GhostStream:
    type: application
    platform: iOS
    dependencies:
      - package: GhostStreamCore
    sources:
      - path: .
        excludes:
          - Tests/**
          - VPN/**
          - "*.sh"
          - "*.md"
          - "*.yml"
          - "*.bat"
          - "*.plist"
          - "*.jsx"
          - .github/**
          - .git/**
          - .gitignore
          - DEPENDENCIES.swift
          - project.yml
          - GhostStream.entitlements
    dependencies:
      - package: GhostStreamCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghoststream.browser
        PRODUCT_NAME: "GhostStream"
