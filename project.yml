name: GhostStream
options:
  bundleIdPrefix: com.ghoststream
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGN_STYLE: "Manual"
    DEVELOPMENT_TEAM: ""
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: "wholemodule"

targets:
  GhostStream:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - Tests/**
          - "*.sh"
          - "*.md"
          - "*.yml"
          - "*.bat"
          - .github/**
          - .git/**
          - .gitignore
          - ExportOptions.plist
          - DEPENDENCIES.swift
          - VPN/Tunnel/**
          - project.yml
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghoststream.browser
        PRODUCT_NAME: "GhostStream"
    info:
      path: Info.plist
