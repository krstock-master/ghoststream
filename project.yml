name: GhostStream
options:
  bundleIdPrefix: com.ghoststream
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    MARKETING_VERSION: "0.1.1"
    CURRENT_PROJECT_VERSION: "2"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGN_STYLE: "Manual"
    DEVELOPMENT_TEAM: ""
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: "wholemodule"

targets:
  GhostStream:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - Tests/**
          - "*.sh"
          - "*.md"
          - "*.yml"
          - "*.bat"
          - .github/**
          - .git/**
          - .gitignore
          - ExportOptions.plist
          - DEPENDENCIES.swift
          - VPN/Tunnel/**
          - project.yml
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ghoststream.browser
        PRODUCT_NAME: "GhostStream"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "GhostStream"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "보관함 잠금 해제에 Face ID를 사용합니다."
    entitlements:
      path: GhostStream.entitlements
