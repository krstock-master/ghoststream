name: Build GhostStream IPA

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          echo "Schemes:"
          xcodebuild -list -project GhostStream.xcodeproj

      - name: Verify Info.plist
        run: |
          echo "=== Check INFOPLIST_FILE setting ==="
          xcodebuild -showBuildSettings -project GhostStream.xcodeproj -scheme GhostStream 2>/dev/null | grep INFOPLIST
          echo ""
          echo "=== SupportFiles-Info.plist exists ==="
          cat SupportFiles-Info.plist | head -20
          echo "..."

      - name: Build for Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project GhostStream.xcodeproj \
            -scheme GhostStream \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build.log
          echo "Build succeeded"

      - name: Show build errors if failed
        if: failure()
        run: |
          echo "=== COMPILATION ERRORS ==="
          grep -A2 "error:" build.log || echo "No error lines found"
          echo ""
          echo "=== LAST 100 LINES ==="
          tail -100 build.log

      - name: Archive for Release
        run: |
          set -o pipefail
          xcodebuild archive \
            -project GhostStream.xcodeproj \
            -scheme GhostStream \
            -configuration Release \
            -archivePath build/GhostStream.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee archive.log
          echo "Archive succeeded"

      - name: Show archive errors if failed
        if: failure()
        run: |
          echo "=== ARCHIVE ERRORS ==="
          grep -A2 "error:" archive.log 2>/dev/null || echo "No archive log"
          echo ""
          echo "=== LAST 100 LINES ==="
          tail -100 archive.log 2>/dev/null || true

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/GhostStream.xcarchive -name "*.app" -type d | head -1)
          echo "App: $APP_PATH"
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r GhostStream.ipa Payload/
          echo "IPA: $(ls -lh GhostStream.ipa | awk '{print $5}')"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GhostStream-IPA
          path: build/GhostStream.ipa
          retention-days: 90

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: GhostStream-IPA
      - uses: softprops/action-gh-release@v1
        with:
          files: GhostStream.ipa
          body: |
            ## GhostStream ${{ github.ref_name }}
            Download and install with SideStore / TrollStore / Sideloadly.
          generate_release_notes: true
