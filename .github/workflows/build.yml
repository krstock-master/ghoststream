name: Build GhostStream IPA
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Security Scan
        run: |
          echo "=== 민감 정보 검사 ==="
          FOUND=0
          if grep -rn "ghp_[a-zA-Z0-9]\{30,\}" --include="*.swift" --include="*.json" --include="*.plist" .; then
            echo "❌ PAT 토큰 발견!"; FOUND=1
          fi
          if grep -rn "seededRand\|UNMASKED_VENDOR\|createDynamicsCompressor" --include="*.swift" .; then
            echo "❌ 핑거프린팅 JS 노출!"; FOUND=1
          fi
          if grep -rn "videoplayback\|googlevideo\|fbcdn.*video\|mypikpak" --include="*.swift" .; then
            echo "❌ CDN 패턴 노출!"; FOUND=1
          fi
          if [ $FOUND -eq 1 ]; then
            echo "::error::민감 정보가 Public 코드에 포함되어 있습니다!"
            exit 1
          fi
          echo "✅ 보안 검사 통과"

      - name: Setup Private Package Access
        run: |
          git config --global url."https://${{ secrets.CORE_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project
        run: |
          xcodegen generate
          echo "=== Generated project ==="
          xcodebuild -list -project GhostStream.xcodeproj

      - name: Inject Info.plist into project
        run: |
          # xcodegen ignores our plist, so we force it into the project
          PBXPROJ="GhostStream.xcodeproj/project.pbxproj"
          
          # Replace the auto-generated INFOPLIST_FILE with our file
          sed -i '' 's|GENERATE_INFOPLIST_FILE = YES|GENERATE_INFOPLIST_FILE = NO|g' "$PBXPROJ"
          
          # If there's an existing INFOPLIST_FILE, replace it; otherwise add it
          if grep -q "INFOPLIST_FILE" "$PBXPROJ"; then
            sed -i '' 's|INFOPLIST_FILE = "[^"]*"|INFOPLIST_FILE = "SupportFiles-Info.plist"|g' "$PBXPROJ"
          else
            sed -i '' 's|GENERATE_INFOPLIST_FILE = NO;|GENERATE_INFOPLIST_FILE = NO; INFOPLIST_FILE = "SupportFiles-Info.plist";|g' "$PBXPROJ"
          fi
          
          echo "=== Verify pbxproj ==="
          grep "INFOPLIST_FILE\|GENERATE_INFOPLIST" "$PBXPROJ" | head -10
          echo ""
          echo "=== SupportFiles-Info.plist keys ==="
          grep "<key>" SupportFiles-Info.plist

      - name: Build Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project GhostStream.xcodeproj \
            -scheme GhostStream \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            INFOPLIST_FILE="$(pwd)/SupportFiles-Info.plist" \
            GENERATE_INFOPLIST_FILE=NO \
            2>&1 | tee build.log

      - name: Show errors
        if: failure()
        run: grep -A2 "error:" build.log 2>/dev/null | head -20

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project GhostStream.xcodeproj \
            -scheme GhostStream \
            -configuration Release \
            -archivePath build/GhostStream.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            INFOPLIST_FILE="$(pwd)/SupportFiles-Info.plist" \
            GENERATE_INFOPLIST_FILE=NO \
            2>&1 | tee archive.log

      - name: Verify IPA Info.plist
        run: |
          PLIST=$(find build/GhostStream.xcarchive -name "Info.plist" -path "*/GhostStream.app/*" | head -1)
          echo "=== Info.plist in archive ==="
          if [ -n "$PLIST" ]; then
            plutil -p "$PLIST"
          else
            echo "ERROR: No Info.plist found in archive!"
            find build/GhostStream.xcarchive -name "Info.plist" | head -5
          fi

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/GhostStream.xcarchive -name "*.app" -type d | head -1)
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r GhostStream.ipa Payload/
          echo "IPA: $(ls -lh GhostStream.ipa | awk '{print $5}')"

      - name: IPA Binary Security Scan
        run: |
          echo "=== IPA 바이너리 민감 정보 검사 ==="
          APP_PATH=$(find build/Payload -name "*.app" -type d | head -1)
          BINARY="$APP_PATH/GhostStream"
          FOUND=0
          # PAT 토큰
          if strings "$BINARY" | grep -q "ghp_[a-zA-Z0-9]\{30,\}"; then
            echo "❌ 바이너리에 PAT 토큰 발견!"; FOUND=1
          fi
          # 하드코딩된 비밀
          if strings "$BINARY" | grep -qi "api_key.*=\|secret_key"; then
            echo "❌ 바이너리에 API 키 발견!"; FOUND=1
          fi
          if [ $FOUND -eq 1 ]; then
            echo "::error::IPA 바이너리에 민감 정보 포함!"
            exit 1
          fi
          echo "✅ IPA 보안 검사 통과"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GhostStream-IPA
          path: build/GhostStream.ipa
          retention-days: 90

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: GhostStream-IPA
      - uses: softprops/action-gh-release@v1
        with:
          files: GhostStream.ipa
          generate_release_notes: true
